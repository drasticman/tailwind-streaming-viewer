<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Tailwind Tech Streaming</title>
  <link rel="icon" type="image/png" href="/logo.png">

  <style>
    :root {
      --graphite: #343638;
      --deep-space: #0b0b0b;
      --cloudless: #c2d7ef;
      --storm-watch: #b9bcc1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--graphite);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: min(680px, 100%);
      padding: 32px;
      text-align: center;
      background: var(--deep-space);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    .logo {
      width: min(260px, 70%);
      height: auto;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--cloudless);
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }

    p {
      max-width: 620px;
      margin: 0 auto;
      color: var(--storm-watch);
      font-size: 16px;
      line-height: 1.55;
    }

    .contact {
      margin-top: 18px;
      color: white;
      font-weight: 650;
    }

    .email {
      display: inline-block;
      margin-top: 8px;
      color: var(--cloudless);
      font-weight: 650;
      text-decoration: none;
    }

    .email:hover {
      text-decoration: underline;
    }

    .error {
      color: #ffd1d1;
    }
  </style>
</head>

<body>
  <main id="landing-card" class="card" hidden>
    <img class="logo" src="/logo.png" alt="Tailwind Tech Streaming">

    <h1>No streams scheduled</h1>

    <p>
      Tailwind Tech Streaming is ready for live production monitoring,
      but there are no camera feeds scheduled right now.
    </p>

    <p class="contact">
      For remote viewing, on-set streaming, or quote requests, contact:
    </p>

    <a
      class="email"
      href="mailto:streaming@tailwindtech.xyz?subject=Streaming%20Inquiry"
    >
      streaming@tailwindtech.xyz
    </a>
  </main>

  <script>
    async function start() {
      try {
        const response = await fetch("/projects/main.json", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`main.json returned ${response.status}`);
        }

        const config = await response.json();
        const mainProject = String(config.mainProject || "offline")
          .trim()
          .toLowerCase();

        if (mainProject && mainProject !== "offline") {
          window.location.replace(`/${encodeURIComponent(mainProject)}/`);
          return;
        }

        document.getElementById("landing-card").hidden = false;
      } catch (error) {
        console.error("Could not load main project configuration:", error);

        const card = document.getElementById("landing-card");
        card.hidden = false;

        const message = card.querySelector("p");
        message.textContent =
          "The streaming site is temporarily unavailable. Please try again shortly.";
        message.classList.add("error");
      }
    }

    start();
  </script>
</body>
</html>
